# /etc/nginx/sites-available/aisix.ruk.solutions.conf
#
# Mode: Cloudflare "Flexible" SSL
#   Client ──HTTPS──► Cloudflare ──HTTP (port 80)──► Nginx (this) ──► AISIX
#
# nginx จึง listen แค่ port 80 ไม่ต้องมี cert ที่ origin
# (ปลายทางจริง Cloudflare เป็นคนทำ TLS ให้ client)
#
# Routes:
#   /v1/*            → Proxy API (127.0.0.1:3000)  ← public, OpenAI-compatible
#   /aisix/admin/*   → Admin API (127.0.0.1:3001)  ← จำกัด IP
#   /ui/, /openapi   → Admin UI  (127.0.0.1:3001)  ← จำกัด IP

server {
    listen 80;
    listen [::]:80;
    server_name aisix.ruk.solutions;

    # ── Real client IP จาก header CF-Connecting-IP ───────────────────────────
    # อัปเดต list ได้จาก https://www.cloudflare.com/ips/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # body ใหญ่หน่อยเผื่อ payload (รูป / embeddings)
    client_max_body_size 25m;

    # streaming chat completions (SSE) ต้องไม่ buffer
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    # client มาเป็น https แล้วโดน CF เปลี่ยนเป็น http เข้า origin
    # forward ค่าเดิมของ CF-Visitor.scheme ให้ AISIX รู้ว่าต้นทางเป็น https
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Connection        "";

    # ── 1) Proxy API (public) ────────────────────────────────────────────────
    # OpenAI SDK base_url = https://aisix.ruk.solutions/v1
    location /v1/ {
        proxy_pass http://127.0.0.1:3000;

        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     1h;
        proxy_send_timeout     1h;
        chunked_transfer_encoding on;
    }

    # health probe
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # ── 2) Admin API (จำกัดสิทธิ์) ────────────────────────────────────────────
    # ⚠️ หมายเหตุ Flexible mode: Cloudflare เป็นตัว terminate TLS แล้ว forward ผ่าน
    # public IP ของ CF เข้ามา → IP ที่ nginx เห็นจริง ๆ คือ CF-Connecting-IP
    # ต้องใช้ allow ตาม IP บ้าน/ออฟฟิศ ของผู้ใช้ (CF จะส่งใน header นี้)
    location /aisix/admin/ {
        # allow 203.0.113.10/32;        # ตัวอย่าง: IP บ้าน
        # allow 10.0.0.0/8;              # ตัวอย่าง: VPN
        # deny  all;

        proxy_pass http://127.0.0.1:3001;
        proxy_read_timeout 60s;
    }

    # ── 3) Admin UI + OpenAPI (จำกัดสิทธิ์เหมือน admin) ───────────────────────
    location /ui/ {
        # allow 203.0.113.10/32;
        # deny  all;
        proxy_pass http://127.0.0.1:3001;
    }

    location = /openapi {
        # allow 203.0.113.10/32;
        # deny  all;
        proxy_pass http://127.0.0.1:3001;
    }

    location /assets/ {
        proxy_pass http://127.0.0.1:3001;
    }

    # default: ปิดไว้ ป้องกันคนหลงเข้ามาที่ /
    location = / {
        return 404;
    }
}
